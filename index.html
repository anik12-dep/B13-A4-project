<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Application Tracker</title>
  <link rel="stylesheet" href="style.css/styles.css">
</head>
<body>

<div class="container">

  <h1>Job Application Tracker</h1>

  <!-- Dashboard -->
  <div class="dashboard">
    <div class="dash-card">
      <h3>Total</h3>
      <p id="totalCount">8</p>
    </div>
    <div class="dash-card">
      <h3>Interview</h3>
      <p id="interviewCount">0</p>
    </div>
    <div class="dash-card">
      <h3>Rejected</h3>
      <p id="rejectedCount">0</p>
    </div>
  </div>

   <!-- Section Header Part -->
  <div class="section-header">
    <h2>Available Jobs</h2>
    <span id="tabCount">8 jobs</span>
  </div>

  <!-- Tabs of the header-->
  <div class="tabs">
    <button class="tab active" data-tab="all">All</button>
    <button class="tab" data-tab="interview">Interview</button>
    <button class="tab" data-tab="rejected">Rejected</button>
  </div>

  <!-- Job Cards -->
  <div id="jobContainer" class="jobs"></div>

</div>

</body>
</html>
